name: AI Travel Concierge CI

on:
  push:
    branches:
      - main
      - track-b
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Check Python syntax
        run: |
          python -m compileall agent tools monitoring pages

      - name: Run Ruff
        run: |
          ruff check agent tools monitoring tests

      - name: Run tests
        run: |
          pytest -v
